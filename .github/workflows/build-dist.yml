# 在云端用「scheme-basic + tlmgr 补包」完整编译，并打包分发。
# 触发：push 到 main；推送 v* 标签（同时上传 Release 资源）。

name: Build distribution

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system fonts (Times New Roman + CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer fonts-noto-cjk

      # TeX-Live/setup-texlive-action@v4（替代已删除的 teatimeguest）：
      # https://github.com/TeX-Live/setup-texlive-action
      #
      # 缓存行为（与「分阶段 / 只下新增包」相关）：
      # - 默认 cache: true：post 阶段保存**整棵** TEXDIR；命中条件为「版本 + package-file
      #   所列包集合」与缓存键**完全一致**（见 action 文档 cache-hit）。
      # - 因此修改 .github/texlive-packages.txt 任意一行 → 新键 → 通常**整次重装**所列包，
      #   并非「只增量下载新加的那几个 CTAN 包」；action **不提供**「scheme-basic 与追加包
      #   分两个缓存键」的官方分阶段。
      # - 若需长期固定键、每次仅 tlmgr 补差：须 cache: false 后自管 install-tl + actions/cache
      #   （维护成本高）；或改用预装依赖的 **Docker 镜像**（推荐在包很多时）。
      - name: Install TeX Live (scheme-basic + package-file)
        uses: TeX-Live/setup-texlive-action@v4
        with:
          version: 2025
          package-file: .github/texlive-packages.txt

      # 勿在 with.packages 与 package-file 并列（实现上可能只取其一，导致仅装少量包）。
      # 此处对易在缓存/解析间隙缺失的包再执行 tlmgr；已安装时几乎瞬时跳过。
      - name: TeX Live — ensure lineno + csquotes
        run: |
          set -euo pipefail
          tlmgr --version
          tlmgr install lineno csquotes

      - name: Build (make cls && make all)
        run: |
          set -euo pipefail
          make cls
          make all

      - name: Create ZIP archive
        run: |
          set -euo pipefail
          zip -r swuthesis-dist.zip \
            swuthesis.cls \
            swuthesis-doc-patch.sty \
            swuthesis.dtx \
            swuthesis.ins \
            swuthesis-main.tex \
            swuthesis-graduate-main.tex \
            swuthesis-postdoc-main.tex \
            swuthesis-main.bib \
            swuthesis-graduate-main.bib \
            swuthesis-postdoc-main.bib \
            examples \
            figures \
            codes \
            Makefile \
            README.md \
            LICENSE \
            CHANGELOG.md \
            .latexmkrc \
            swuthesis-main.pdf \
            swuthesis-graduate-main.pdf \
            swuthesis-postdoc-main.pdf \
            swuthesis-doc.pdf

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: swuthesis-dist-${{ github.sha }}
          path: swuthesis-dist.zip
          if-no-files-found: error

      - name: Upload release asset (tags only)
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: softprops/action-gh-release@v2
        with:
          files: swuthesis-dist.zip
          generate_release_notes: true
